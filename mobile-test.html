<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sensor Simulator - AquaSafe</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap');

    :root {
      --primary: #00d2ff;
      --secondary: #3a7bd5;
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.75);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #2dd4bf;
      --error: #fb7185;
      --success: #34d399;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #020617 0%, #0f172a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: var(--text-main);
      overflow-x: hidden;
      padding: 20px;
      position: relative;
    }

    /* Ambient background glow and animated elements */
    body::before,
    body::after {
      content: '';
      position: absolute;
      width: 45vw;
      height: 45vw;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      z-index: 0;
      animation: pulseGlow 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    body::before {
      top: -10vw;
      left: -10vw;
      background: var(--primary);
    }

    body::after {
      bottom: -10vw;
      right: -10vw;
      background: var(--secondary);
      animation-delay: -4s;
    }

    @keyframes pulseGlow {
      0% {
        transform: scale(1) translate(0, 0);
        opacity: 0.15;
      }

      50% {
        opacity: 0.25;
      }

      100% {
        transform: scale(1.1) translate(40px, 40px);
        opacity: 0.15;
      }
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 2.5rem;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      width: 100%;
      max-width: 440px;
      z-index: 1;
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
      opacity: 0;
      transform: translateY(30px);
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 40px 60px -15px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 600;
      background: linear-gradient(to right, #00d2ff, #3a5cf5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 30px;
      text-align: center;
      letter-spacing: -0.5px;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    .row {
      display: flex;
      gap: 15px;
    }

    .row .input-group {
      flex: 1;
      margin-bottom: 10px;
    }

    label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-muted);
      transition: color 0.3s ease;
    }

    .hint {
      font-size: 0.75rem;
      opacity: 0.6;
      font-weight: 400;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: var(--text-main);
      font-size: 1rem;
      font-family: 'Outfit', sans-serif;
      transition: all 0.3s ease;
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    input:focus {
      border-color: rgba(0, 210, 255, 0.5);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 4px rgba(0, 210, 255, 0.15), inset 0 2px 4px rgba(0, 0, 0, 0.2);
      transform: translateY(-2px);
    }

    input:hover {
      border-color: rgba(255, 255, 255, 0.25);
    }

    /* Small label animation on input focus */
    .input-group:focus-within label {
      color: var(--primary);
      transform: translateY(-1px);
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 16px;
      background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Outfit', sans-serif;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 20px -10px rgba(58, 123, 213, 0.6);
      z-index: 1;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s ease;
      z-index: -1;
    }

    button:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 25px -10px rgba(58, 123, 213, 0.8);
    }

    button:hover::before {
      left: 100%;
    }

    button:active {
      transform: translateY(1px) scale(0.98);
      box-shadow: 0 5px 10px -5px rgba(58, 123, 213, 0.6);
    }

    .status {
      margin-top: 20px;
      text-align: center;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 14px;
      border-radius: 12px;
      display: none;
      animation: fadeInStatus 0.4s ease;
      background: rgba(52, 211, 153, 0.1);
      color: var(--success);
      border: 1px solid rgba(52, 211, 153, 0.2);
    }

    .status:not(:empty) {
      display: block;
    }

    .status.error {
      background: rgba(251, 113, 133, 0.1);
      color: var(--error);
      border: 1px solid rgba(251, 113, 133, 0.2);
    }

    @keyframes fadeInStatus {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Responsive adjustments */
    @media (max-width: 480px) {
      .card {
        padding: 2rem;
      }

      .row {
        flex-direction: column;
        gap: 0px;
      }

      .row .input-group {
        margin-bottom: 20px;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>AquaSafe Simulator</h2>

    <div class="input-group">
      <label>Backend URL</label>
      <input type="text" id="url" value="http://192.168.1.101:5000/api/sensor-data" autocomplete="off" />
    </div>

    <div class="input-group">
      <label>Meter ID</label>
      <input type="text" id="meterId" value="METER-101" autocomplete="off" />
    </div>

    <div class="row">
      <div class="input-group">
        <label>TDS <span class="hint">(Safe &lt;= 500)</span></label>
        <input type="number" id="tds" value="400" />
      </div>

      <div class="input-group">
        <label>Turbidity <span class="hint">(Safe &lt;= 5)</span></label>
        <input type="number" id="turbidity" value="3" />
      </div>

      <div class="input-group">
        <label>pH <span class="hint">(Safe 6.5 - 8.5)</span></label>
        <input type="number" id="ph" value="7.0" />
      </div>
    </div>

    <button onclick="sendData()">Send Data</button>

    <div class="status" id="statusMsg"></div>
  </div>

  <script>
    async function sendData() {
      const url = document.getElementById('url').value;
      const meterId = document.getElementById('meterId').value;
      const tds = parseFloat(document.getElementById('tds').value);
      const turbidity = parseFloat(document.getElementById('turbidity').value);
      const ph = parseFloat(document.getElementById('ph').value);
      const statusMsg = document.getElementById('statusMsg');

      const data = {
        meterId,
        tds,
        turbidity,
        ph,
        dateTime: new Date().toISOString()
      };

      try {
        const response = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok) {
          statusMsg.className = 'status';
          statusMsg.innerText = 'Data sent! Status: ' + result.status;
        } else {
          throw new Error(result.message);
        }
      } catch (err) {
        statusMsg.className = 'status error';
        statusMsg.innerText = 'Error: ' + err.message;
      }
    }
  </script>
</body>

</html>
